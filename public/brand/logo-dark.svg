<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none" role="img" aria-label="ClaimX">
  <defs>
    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="4" y1="4" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#00FFE7"/>
    </linearGradient>
    <!-- Text X gradient (horizontal) -->
    <linearGradient id="xGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#00FFE7"/>
    </linearGradient>
    <!-- Box glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Icon box background -->
  <rect x="0" y="6" width="40" height="40" rx="10" fill="#020408"/>
  <rect x="0" y="6" width="40" height="40" rx="10" fill="none" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>

  <!-- X icon — 24×24 paths, centered in 40×40 box: translate(8,14) keeps 24px natural size -->
  <g transform="translate(8, 14)">
    <path stroke="url(#iconGrad)" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M15.24 10.233A4.619 4.619 0 0 0 12 8.89c-1.204 0-2.39.492-3.24 1.344l-6.244 6.243c-1.32 1.38-1.296 3.63.054 4.981 1.351 1.35 3.602 1.375 4.981.054l4.45-4.449 4.448 4.45c1.38 1.32 3.63 1.296 4.98-.055 1.351-1.35 1.376-3.6.055-4.98l-6.243-6.244Z"/>
    <path stroke="url(#iconGrad)" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M6.993 12 2.516 7.524c-1.32-1.38-1.296-3.63.054-4.981 1.351-1.35 3.602-1.375 4.981-.054l4.45 4.449 4.448-4.45c1.38-1.32 3.63-1.296 4.98.055 1.351 1.35 1.376 3.6.055 4.98L17.007 12"/>
    <path stroke="url(#iconGrad)" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
      d="M17.007 12 12 17.064 6.993 12"/>
  </g>

  <!-- "Claim" wordmark — white (works on dark bg) -->
  <!-- "Claim" + "X" as single text with tspan — eliminates font-width gap -->
  <text
    x="52" y="35"
    font-family="'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif"
    font-weight="700"
    font-size="26"
    letter-spacing="-0.5"
  ><tspan fill="#FFFFFF">Claim</tspan><tspan fill="url(#xGrad)">X</tspan></text>
</svg>
