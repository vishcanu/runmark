      <stop stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#00B8D9"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#0099BB"/>
      <stop offset="1" stop-color="#00B8D9"/>
